<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pancek Trackday - SSR Gacha Edition</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; font-family: 'Arial', sans-serif; background-color: #1a1a1a; color: #f0f0f0; overflow: hidden; }
        
        #authOverlay { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(26,26,26,0.95); z-index: 5000; display: flex; justify-content: center; align-items: center; }
        .auth-box { background: #2a2a2a; padding: 40px; border-radius: 10px; border-top: 5px solid #ff4500; text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.8); width: 320px; }
        
        #map { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        .floating-header { position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000; background: rgba(42, 42, 42, 0.9); padding: 10px 40px; border-radius: 8px; border-bottom: 4px solid #ff4500; box-shadow: 0 4px 15px rgba(0,0,0,0.5); text-align: center; pointer-events: none; display: flex; align-items: center; gap: 15px; }
        .floating-header h1 { margin: 0; color: #ff4500; letter-spacing: 2px; font-size: 24px; }
        
        .user-widget { position: absolute; top: 20px; right: 20px; z-index: 1000; display: flex; align-items: center; gap: 15px; background: rgba(42, 42, 42, 0.9); padding: 10px 20px; border-radius: 50px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 2px solid #555; }
        .greeting { font-weight: bold; color: #fff; font-size: 16px; }
        .greeting span { color: #ff4500; }
        
        .user-avatar { width: 45px; height: 45px; border-radius: 50%; background: #ff4500; display: flex; justify-content: center; align-items: center; font-weight: bold; font-size: 22px; cursor: pointer; border: 2px solid #fff; transition: 0.2s; overflow: hidden; }
        .user-avatar:hover { transform: scale(1.1); }
        .dropdown-menu { position: absolute; top: 80px; right: 20px; background: #2a2a2a; border-radius: 8px; border: 1px solid #555; box-shadow: 0 5px 15px rgba(0,0,0,0.8); width: 220px; display: none; flex-direction: column; overflow: hidden; z-index: 1001; }
        .dropdown-menu.active { display: flex; }
        .dropdown-item { padding: 12px 20px; color: #fff; cursor: pointer; border-bottom: 1px solid #444; font-weight: bold; transition: 0.2s; }
        .dropdown-item:hover { background: #ff4500; }
        .dropdown-item:last-child { border-bottom: none; }

        input, button, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: none; box-sizing: border-box; }
        input, select { background-color: #444; color: white; border: 1px solid #555; }
        .btn-submit { background-color: #ff4500; color: white; cursor: pointer; font-weight: bold; transition: 0.2s;}
        .btn-submit:hover { background-color: #ff6a00; }
        .hidden { display: none !important; }

        .leaflet-popup-content-wrapper { background: #2a2a2a; color: #f0f0f0; border: 2px solid #ff4500; border-radius: 8px; }
        .leaflet-popup-tip { background: #ff4500; }
        .leaflet-popup-content { margin: 15px; width: 340px !important; }
        .track-info { font-size: 13px; text-align: left; background: #222; padding: 12px; border-radius: 6px; margin: 15px 0; border-left: 3px solid #ff4500; }
        table { width: 100%; border-collapse: collapse; margin: 10px 0; background: #333; font-size: 14px; }
        th, td { border: 1px solid #555; padding: 6px; text-align: center; }
        th { background-color: #ff4500; color: white; }
        
        .car-link { color: #3498db; text-decoration: none; font-weight: bold; cursor: pointer; }
        .car-link:hover { color: #5dade2; text-decoration: underline; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 4000; display: none; justify-content: center; align-items: center; }
        .modal-overlay.active { display: flex; }
        .modal-content { background: #2a2a2a; padding: 25px; border-radius: 12px; border-top: 5px solid #ff4500; width: 90%; max-width: 550px; max-height: 90vh; overflow-y: auto; position: relative; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .close-modal { position: absolute; top: 10px; right: 15px; font-size: 24px; color: #aaa; cursor: pointer; z-index: 100; }
        .close-modal:hover { color: #fff; }

        .garage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; background: #333; margin-bottom: 5px; border-radius: 5px; border-left: 3px solid #1db954; }
        .garage-item-btns button { padding: 5px 8px; margin-left: 5px; border: none; border-radius: 3px; cursor: pointer; color: white; font-weight: bold; width: auto; font-size: 12px; }
        .btn-view { background: #3498db; } .btn-view:hover { background: #2980b9; }
        .btn-edit { background: #f39c12; } .btn-edit:hover { background: #d68910; }
        .btn-del { background: #e74c3c; } .btn-del:hover { background: #c0392b; }

        /* NOWY STYL KARTY UMA MUSUME */
        .stat-row { display: flex; justify-content: space-between; border-bottom: 1px solid rgba(255,255,255,0.2); padding: 5px 0; }
        .stat-label { color: #ccc; font-weight: bold; font-size: 13px; text-shadow: 1px 1px 2px #000; }
        .stat-value { color: #fff; font-weight: bold; font-size: 14px; text-shadow: 1px 1px 2px #000; }
    </style>
    <script src="https://www.youtube.com/iframe_api"></script>
</head>
<body>

    <div id="authOverlay">
        <div class="auth-box">
            <h1 style="color: #ff4500; margin-top: 0;">🏁 Pit Lane</h1>
            <input type="email" id="email" placeholder="Twój email">
            <input type="password" id="password" placeholder="Hasło">
            <button id="loginBtn" class="btn-submit">Odpal silnik</button>
            <div style="margin-top: 15px; font-size: 12px;">
                <a href="#" id="forgotPwdBtn" style="color: #aaa;">Zapomniałem hasła</a>
            </div>
        </div>
    </div>

    <div id="map"></div>

    <div id="appUI" class="hidden">
        <div class="floating-header">
            <img src="https://media.tenor.com/-lfKiysaO2oAAAAj/uma-musume-chibi.gif" style="height: 40px;">
            <h1>PANCEK TRACKDAY</h1>
            <img src="https://media.tenor.com/-lfKiysaO2oAAAAj/uma-musume-chibi.gif" style="height: 40px; transform: scaleX(-1);">
        </div>

        <div class="user-widget">
            <div class="greeting">Hej <span id="userAlias">Kierowca</span>!</div>
            <div class="user-avatar" id="avatarBtn">P</div> 
        </div>

        <div class="dropdown-menu" id="userMenu">
            <div class="dropdown-item" onclick="openGarage()">🚗 Mój Garaż (Fury)</div>
            <div class="dropdown-item" onclick="openSettings()">⚙️ Ustawienia Profilu</div>
            <div class="dropdown-item" id="radioBtnToggle">🔇 Wyłącz Audio</div>
            <div class="dropdown-item" id="logoutBtn" style="color: #e74c3c;">🚪 Wyloguj</div>
        </div>
    </div>

    <div id="youtubePlayer" style="position: absolute; left: -9999px;"></div>

    <div class="modal-overlay" id="garageModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModals()">×</span>
            <h2 style="color: #ff4500; margin-top: 0;">🚗 Twój Garaż</h2>
            
            <div style="background: #222; padding: 15px; border-radius: 8px; margin-bottom: 20px;">
                <h3 id="garageFormTitle" style="margin-top: 0; font-size: 16px;">Dodaj nową furę:</h3>
                <input type="hidden" id="editCarId" value="">
                
                <input type="text" id="newCarName" placeholder="Nazwa fury (np. Gruz E36)">
                <input type="text" id="newCarPhoto" placeholder="Link do zdjęcia (URL, np. z Discorda)">
                <input type="text" id="newCarEngine" placeholder="Silnik / Pojemność (np. 2.8 R6)">
                <input type="text" id="newCarAccel" placeholder="0-100 km/h (np. 6.5s)">
                <input type="text" id="newCarTires" placeholder="Opony (np. Semi-Slick)">
                <button id="saveCarBtn" onclick="saveNewCar()" class="btn-submit">Dodaj do garażu!</button>
                <button id="cancelEditBtn" onclick="cancelEdit()" class="btn-submit hidden" style="background: #555; margin-top: 5px;">Anuluj Edycję</button>
            </div>

            <h3 style="margin-top: 0; border-bottom: 1px solid #555; padding-bottom: 5px;">Twoje maszyny:</h3>
            <ul id="myCarsList" style="list-style: none; padding: 0; margin: 0; color: #aaa;">
                <li>Ładowanie garażu...</li>
            </ul>
        </div>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-content">
            <span class="close-modal" onclick="closeModals()">×</span>
            <h2 style="color: #ff4500; margin-top: 0;">⚙️ Ustawienia Profilu</h2>
            <p style="color: #aaa; font-size: 14px;">Zmień swój awatar (wklej link URL do obrazka):</p>
            <input type="text" id="avatarUrlInput" placeholder="https://link-do-obrazka.jpg">
            <button onclick="saveAvatar()" class="btn-submit">Zapisz Awatar</button>
        </div>
    </div>

    <div class="modal-overlay" id="umaCardModal">
        <div class="modal-content" style="padding: 0; border: none; background: transparent; width: 340px;">
            <span class="close-modal" onclick="closeModals()" style="color: #fff; text-shadow: 0 0 5px #000; right: -20px; top: -20px;">×</span>
            <div id="umaCardContent"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut, onAuthStateChanged, sendEmailVerification, sendPasswordResetEmail, updateProfile } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-auth.js";
        import { getFirestore, collection, addDoc, getDocs, query, where, orderBy, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.11.0/firebase-firestore.js";

        // ==========================================
        // TUTAJ WKLEJ SWÓJ KOD firebaseConfig
        // ==========================================
        const firebaseConfig = {
            apiKey: "AIzaSyBzQ0BiOaLPagjDrGKRorGliVNzsWgVEZI",
            authDomain: "pancek-trackday.firebaseapp.com",
            projectId: "pancek-trackday",
            storageBucket: "pancek-trackday.firebasestorage.app",
            messagingSenderId: "259254559037",
            appId: "1:259254559037:web:be2b584673d77ec6312554"
        };
        // ==========================================

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.myCars = []; 
        window.currentUserAlias = "";

        // --- MAPA (SATELITA DOMYŚLNIE) ---
        const darkMap = L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png');
        const satelliteMap = L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}');
        // Ustawienie domyślnej warstwy na satelliteMap
        const map = L.map('map', { zoomControl: false, layers: [satelliteMap] }).setView([51.8, 20.5], 7);
        L.control.zoom({ position: 'topleft' }).addTo(map);
        L.control.layers({ "Tryb Nocny": darkMap, "Satelita": satelliteMap }, null, {position: 'bottomleft'}).addTo(map);

        const tory = [
            { nazwa: "Autodrom Bemowo", lat: 52.265, lng: 20.912, opis: "Najbliżej i bezpiecznie", cena: "Nieznana", kontakt: "sekretariat@automobilklubpolski.pl" },
            { nazwa: "Tor Modlin", lat: 52.444, lng: 20.648, opis: "Wąsko, ale z uwagą można pojechać nawet daily carem", cena: "Nieznana, ponoć tanio", kontakt: "+48 22 100 27 00" },
            { nazwa: "Autodrom Słomczyn", lat: 51.905, lng: 20.842, opis: "Szeroko i bezpiecznie", cena: "Trackday: 400 zł", kontakt: "+48 605 453 971" },
            { nazwa: "Autodrom Jastrząb", lat: 51.246, lng: 20.942, opis: "Dalej ale bezpiecznie", cena: "Nieznana", kontakt: "+48 694 427 709" },
            { nazwa: "Tor Kielce", lat: 50.963, lng: 20.457, opis: "Historyczny tor z odcinkiem leśnym", cena: "", kontakt: "" },
            { nazwa: "Tor Ułęż Moto Park", lat: 51.624, lng: 22.094, opis: "Lotnisko pod większe prędkości", cena: "500 zł/h", kontakt: "" },
            { nazwa: "TOR ŁÓDŹ", lat: 51.849, lng: 19.539, opis: "Najmniejszy obiekt", cena: "", kontakt: "" }
        ];

        // --- MENU ---
        const avatarBtn = document.getElementById('avatarBtn');
        const userMenu = document.getElementById('userMenu');
        avatarBtn.addEventListener('click', () => userMenu.classList.toggle('active'));
        document.addEventListener('click', (e) => {
            if(!avatarBtn.contains(e.target) && !userMenu.contains(e.target)) userMenu.classList.remove('active');
        });

        window.openGarage = async () => { userMenu.classList.remove('active'); document.getElementById('garageModal').classList.add('active'); await loadMyGarage(); };
        window.openSettings = () => { userMenu.classList.remove('active'); document.getElementById('settingsModal').classList.add('active'); };
        window.closeModals = () => { document.getElementById('garageModal').classList.remove('active'); document.getElementById('umaCardModal').classList.remove('active'); document.getElementById('settingsModal').classList.remove('active'); window.cancelEdit(); };

        window.saveAvatar = async () => {
            const url = document.getElementById('avatarUrlInput').value;
            if(!url) return alert("Podaj link URL do obrazka!");
            try { await updateProfile(auth.currentUser, { photoURL: url }); alert("Awatar zaktualizowany!"); updateAvatarUI(auth.currentUser); window.closeModals(); } 
            catch(e) { alert("Błąd: " + e.message); }
        };

        function updateAvatarUI(user) {
            if(user.photoURL) avatarBtn.innerHTML = `<img src="${user.photoURL}" style="width:100%; height:100%; border-radius:50%; object-fit:cover;">`;
            else avatarBtn.innerText = window.currentUserAlias.charAt(0).toUpperCase();
        }

        // --- GARAŻ: DODAWANIE / EDYCJA / USUWANIE ---
        window.saveNewCar = async () => {
            const editId = document.getElementById('editCarId').value;
            const name = document.getElementById('newCarName').value;
            const photo = document.getElementById('newCarPhoto').value || "https://via.placeholder.com/400x250/222/ff4500?text=Brak+Zdjecia";
            const engine = document.getElementById('newCarEngine').value || "Nieznany";
            const accel = document.getElementById('newCarAccel').value || "? s";
            const tires = document.getElementById('newCarTires').value || "Drogowe";

            if(!name) return alert("Podaj chociaż nazwę fury!");

            if(editId) {
                // Tryb Edycji
                await updateDoc(doc(db, "fury", editId), { name: name, photo: photo, engine: engine, accel: accel, tires: tires });
                window.cancelEdit();
            } else {
                // Nowe auto
                await addDoc(collection(db, "fury"), { driver: window.currentUserAlias, name: name, photo: photo, engine: engine, accel: accel, tires: tires });
                document.getElementById('newCarName').value = ''; document.getElementById('newCarPhoto').value = ''; document.getElementById('newCarEngine').value = ''; document.getElementById('newCarAccel').value = ''; document.getElementById('newCarTires').value = '';
            }
            await loadMyGarage(); 
        };

        window.triggerEditCar = (id, name, photo, engine, accel, tires) => {
            document.getElementById('editCarId').value = id;
            document.getElementById('newCarName').value = name;
            document.getElementById('newCarPhoto').value = photo;
            document.getElementById('newCarEngine').value = engine;
            document.getElementById('newCarAccel').value = accel;
            document.getElementById('newCarTires').value = tires;
            
            document.getElementById('garageFormTitle').innerText = "Edytuj furę:";
            document.getElementById('saveCarBtn').innerText = "Zapisz Zmiany";
            document.getElementById('saveCarBtn').style.backgroundColor = "#27ae60";
            document.getElementById('cancelEditBtn').classList.remove('hidden');
        };

        window.cancelEdit = () => {
            document.getElementById('editCarId').value = "";
            document.getElementById('newCarName').value = ''; document.getElementById('newCarPhoto').value = ''; document.getElementById('newCarEngine').value = ''; document.getElementById('newCarAccel').value = ''; document.getElementById('newCarTires').value = '';
            
            document.getElementById('garageFormTitle').innerText = "Dodaj nową furę:";
            document.getElementById('saveCarBtn').innerText = "Dodaj do garażu!";
            document.getElementById('saveCarBtn').style.backgroundColor = "#ff4500";
            document.getElementById('cancelEditBtn').classList.add('hidden');
        };

        window.deleteCar = async (docId) => {
            if(confirm("Na pewno chcesz zezłomować tę furę? (Zniknie z Garażu, ale czasy z tabeli zostaną na wieki!)")) {
                await deleteDoc(doc(db, "fury", docId));
                await loadMyGarage();
            }
        };

        async function loadMyGarage() {
            const q = query(collection(db, "fury"), where("driver", "==", window.currentUserAlias));
            const snapshot = await getDocs(q);
            const list = document.getElementById('myCarsList');
            window.myCars = []; 
            list.innerHTML = "";
            
            if(snapshot.empty) { list.innerHTML = "Brak aut. Dodaj swoją pierwszą furę wyżej!"; return; }

            snapshot.forEach(doc => {
                const data = doc.data();
                window.myCars.push(data.name);
                // Używamy replace dla cudzysłowów, żeby się nie krzaczyło w funkcji onclick
                const safeName = data.name.replace(/'/g, "\\'");
                const safePhoto = data.photo.replace(/'/g, "\\'");
                const safeEngine = data.engine.replace(/'/g, "\\'");
                const safeAccel = data.accel.replace(/'/g, "\\'");
                const safeTires = data.tires.replace(/'/g, "\\'");

                list.innerHTML += `
                    <li class="garage-item">
                        <div style="flex-grow: 1;"><b>${data.name}</b> <span style="font-size:12px; color:#888;">(${data.engine})</span></div>
                        <div class="garage-item-btns">
                            <button class="btn-view" onclick="window.showCarCard('${safeName}', '${window.currentUserAlias}')">👁️ Karta</button>
                            <button class="btn-edit" onclick="window.triggerEditCar('${doc.id}', '${safeName}', '${safePhoto}', '${safeEngine}', '${safeAccel}', '${safeTires}')">✏️ Edytuj</button>
                            <button class="btn-del" onclick="window.deleteCar('${doc.id}')">❌ Usuń</button>
                        </div>
                    </li>`;
            });
        }

        // --- SSR GACHA KARTA UMA MUSUME ---
        window.showCarCard = async (carName, driverName) => {
            document.getElementById('umaCardModal').classList.add('active');
            const cardContent = document.getElementById('umaCardContent');
            cardContent.innerHTML = `<div style="padding: 40px; text-align: center; background: #222; border-radius: 10px;">Ładowanie danych... ⚙️</div>`;

            const q = query(collection(db, "fury"), where("driver", "==", driverName), where("name", "==", carName));
            const snapshot = await getDocs(q);

            if(snapshot.empty) { cardContent.innerHTML = `<div style="padding: 40px; text-align: center; background: #222; border-radius: 10px;">Brak danych w garażu. 😢</div>`; return; }

            const carData = snapshot.docs[0].data();
            
            // Magiczna karta złożona z warstw
            cardContent.innerHTML = `
                <div style="position: relative; width: 340px; height: 500px; margin: auto; background: #000; border-radius: 18px; overflow: hidden; box-shadow: 0 0 20px rgba(255, 69, 0, 0.6);">
                    
                    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('${carData.photo}'); background-size: cover; background-position: center; z-index: 1;"></div>
                    
                    <div style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: url('https://pbs.twimg.com/media/GxszfaMawAE5j4G.png'); background-size: 100% 100%; z-index: 2; pointer-events: none;"></div>
                    
                    <div style="position: absolute; bottom: 0; left: 0; width: 100%; height: 200px; background: linear-gradient(to top, rgba(0,0,0,1) 10%, rgba(0,0,0,0.8) 50%, transparent); z-index: 3; display: flex; flex-direction: column; justify-content: flex-end; padding: 20px; box-sizing: border-box;">
                        
                        <h2 style="font-size: 22px; color: #ffeb3b; margin: 0 0 2px 0; text-transform: uppercase; text-align: center; text-shadow: 2px 2px 4px #000;">${carData.name}</h2>
                        <div style="text-align: center; color: #fff; font-size: 13px; margin-bottom: 15px; text-shadow: 1px 1px 3px #000;">WŁAŚCICIEL: <b>${carData.driver.toUpperCase()}</b></div>
                        
                        <div class="stat-row"><span class="stat-label">SILNIK:</span><span class="stat-value">${carData.engine}</span></div>
                        <div class="stat-row"><span class="stat-label">0-100 km/h:</span><span class="stat-value">${carData.accel}</span></div>
                        <div class="stat-row"><span class="stat-label">OPONY:</span><span class="stat-value" style="color: #4cd137;">${carData.tires}</span></div>
                    </div>
                </div>
            `;
        };

        // --- LOGIKA MAPY ---
        tory.forEach(tor => {
            const marker = L.marker([tor.lat, tor.lng]).addTo(map);
            marker.on('click', () => {
                let infoSekcja = '';
                if(tor.opis || tor.cena || tor.kontakt) {
                    infoSekcja = `<div class="track-info">`;
                    if(tor.opis) infoSekcja += `<div><b>ℹ️ OPIS:</b> ${tor.opis}</div>`;
                    if(tor.cena) infoSekcja += `<div><b>💲 CENA:</b> ${tor.cena}</div>`;
                    if(tor.kontakt) infoSekcja += `<div><b>📞 KONTAKT:</b> ${tor.kontakt}</div>`;
                    infoSekcja += `</div>`;
                }

                let carSelectHTML = `<select id="carSelect-${tor.nazwa.replace(/\s+/g, '')}" style="width:100%;">`;
                if(window.myCars.length === 0) { carSelectHTML += `<option value="" disabled selected>Brak aut! Dodaj w Garażu</option>`; } 
                else { window.myCars.forEach(car => { carSelectHTML += `<option value="${car}">${car}</option>`; }); }
                carSelectHTML += `</select>`;

                const popupHTML = `
                    <div style="text-align: center;">
                        <h2 style="margin: 0 0 5px 0; color: #ff4500; font-size: 20px;">${tor.nazwa}</h2>
                        ${infoSekcja}
                        <table><thead><tr><th>Kierowca</th><th>Fura</th><th>Czas</th></tr></thead><tbody id="table-${tor.nazwa.replace(/\s+/g, '')}"><tr><td colspan='3'>Ładowanie...</td></tr></tbody></table>
                        <hr style="border-color: #444; margin-top: 15px;">
                        ${carSelectHTML}
                        <input type="text" id="time-${tor.nazwa.replace(/\s+/g, '')}" placeholder="Czas (np. 1:45.00)" style="width:100%;">
                        <button onclick="window.saveTime('${tor.nazwa}')" class="btn-submit" style="width:100%; padding:8px;">Zapisz wynik</button>
                    </div>`;
                marker.bindPopup(popupHTML).openPopup();
                window.loadLeaderboard(tor.nazwa);
            });
        });

        // --- ZAPIS WYNIKÓW ---
        window.loadLeaderboard = async (trackName) => {
            const safeId = trackName.replace(/\s+/g, '');
            const tbody = document.getElementById(`table-${safeId}`);
            if(!tbody) return;

            const q = query(collection(db, "czasy"), where("track", "==", trackName), orderBy("time", "asc"));
            const querySnapshot = await getDocs(q);
            tbody.innerHTML = "";
            if (querySnapshot.empty) { tbody.innerHTML = "<tr><td colspan='3' style='color:#aaa;'>Brak wyników.</td></tr>"; return; }

            querySnapshot.forEach((doc) => {
                const data = doc.data();
                const safeCar = data.car.replace(/'/g, "\\'");
                tbody.innerHTML += `<tr><td><b>${data.driver.toUpperCase()}</b></td><td><span class="car-link" onclick="window.showCarCard('${safeCar}', '${data.driver}')">${data.car}</span></td><td style="color: #1db954;"><b>${data.time}</b></td></tr>`;
            });
        };

        window.saveTime = async (trackName) => {
            const safeId = trackName.replace(/\s+/g, '');
            const car = document.getElementById(`carSelect-${safeId}`)?.value;
            const time = document.getElementById(`time-${safeId}`).value;
            if(!car) return alert("Musisz najpierw dodać auto w Garażu!");
            if(!time) return alert("Wpisz czas okrążenia!");

            await addDoc(collection(db, "czasy"), { driver: window.currentUserAlias, car: car, track: trackName, time: time });
            document.getElementById(`time-${safeId}`).value = '';
            window.loadLeaderboard(trackName); 
        };

        document.getElementById('forgotPwdBtn').addEventListener('click', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            if(!email) return alert("Wpisz swój adres email w pole powyżej, a następnie kliknij ponownie 'Zapomniałem hasła'.");
            try { await sendPasswordResetEmail(auth, email); alert("Wysłano link do resetu hasła! Sprawdź skrzynkę e-mail."); } catch(error) { alert("Błąd: " + error.message); }
        });

        document.getElementById('loginBtn').addEventListener('click', async () => {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            if(!email || !password) return alert("Wpisz dane!");
            try { 
                const userCred = await signInWithEmailAndPassword(auth, email, password); 
                if(!userCred.user.emailVerified) { alert("Ten e-mail nie został zweryfikowany! Sprawdź maila."); signOut(auth); }
            } 
            catch (e) {
                if (e.code === 'auth/invalid-credential' || e.code === 'auth/user-not-found') {
                    try {
                        const newUser = await createUserWithEmailAndPassword(auth, email, password);
                        await sendEmailVerification(newUser.user);
                        alert("Konto założone! Wysłaliśmy Ci maila z linkiem weryfikacyjnym.");
                        signOut(auth);
                    } catch(err) { alert("Błąd rejestracji: " + err.message); }
                } else { alert("Błąd: " + e.message); }
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => { userMenu.classList.remove('active'); signOut(auth); });

        onAuthStateChanged(auth, async (user) => {
            if (user && user.emailVerified) {
                window.currentUserAlias = user.email.split('@')[0];
                document.getElementById('userAlias').innerText = window.currentUserAlias.toUpperCase();
                updateAvatarUI(user);
                
                document.getElementById('authOverlay').classList.add('hidden');
                document.getElementById('appUI').classList.remove('hidden');
                map.invalidateSize(); 
                await loadMyGarage();

                if(window.ytPlayer && window.ytPlayer.playVideo && !window.isRadioPlaying) {
                    window.ytPlayer.playVideo();
                    document.getElementById('radioBtnToggle').innerHTML = "🔇 Wyłącz Audio";
                    document.getElementById('radioBtnToggle').style.color = "#e74c3c";
                    window.isRadioPlaying = true;
                }
            } else {
                document.getElementById('authOverlay').classList.remove('hidden');
                document.getElementById('appUI').classList.add('hidden');
                if(window.ytPlayer && window.ytPlayer.pauseVideo) { window.ytPlayer.pauseVideo(); window.isRadioPlaying = false; }
            }
        });
    </script>

    <script>
        window.ytPlayer;
        window.isRadioPlaying = false;
        
        function onYouTubeIframeAPIReady() {
            window.ytPlayer = new YT.Player('youtubePlayer', {
                height: '10', width: '10',
                playerVars: { 
                    'autoplay': 0, 
                    'loop': 1, 
                    
                    // ==========================================
                    // TUTAJ WPISUJESZ ID PLAYLISTY! (TO CO JEST PO list=)
                    // ==========================================
                    'listType': 'playlist',
                    'list': 'PLbPiEQyRcc62qR2gZ_n1tIOfJ6wz0dI-C' // To jest domyślna lista Eurobeat/Initial D
                },
                events: {
                    'onReady': function(event) {
                        event.target.setVolume(15);
                    }
                }
            });
        }

        document.getElementById('radioBtnToggle').addEventListener('click', (e) => {
            if(!window.ytPlayer) return;
            
            if (!window.isRadioPlaying) {
                window.ytPlayer.playVideo();
                e.target.innerHTML = "🔇 Wyłącz Audio"; 
                e.target.style.color = "#e74c3c";
                window.isRadioPlaying = true;
            } else {
                // Teraz poprawnie pauzuje, a nie resetuje!
                window.ytPlayer.pauseVideo();
                e.target.innerHTML = "🎵 Włącz Audio"; 
                e.target.style.color = "#fff";
                window.isRadioPlaying = false;
            }
            document.getElementById('userMenu').classList.remove('active');
        });
    </script>
</body>
</html>
